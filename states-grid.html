<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Earth States Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Space Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow-x: auto;
      min-height: 100vh;
    }
    .page { padding: 40px; }
    .rows { display: flex; flex-direction: column; gap: 10px; }
    .globe-row { display: flex; gap: 10px; flex-wrap: nowrap; }
    .globe-cell { flex-shrink: 0; }
    canvas.gc {
      display: block;
      width: 160px;
      height: 160px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="rows">
    <div class="globe-row" id="past-row"></div>
    <div class="globe-row" id="future-row"></div>
  </div>
</div>

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255];
}

  s.rgb      = s.palette.map(hexToRgb);
  s.hazeRgb  = hexToRgb(s.hazeColor || '#000000');
  s.glowRgb  = s.glowColor ? hexToRgb(s.glowColor) : null;
});

// ─── SDF index mapping (from clock.html) ─────────────────────────────────────
const SDF_TIMESTAMPS        = [0, 66, 120, 180, 240, 300, 360, 420, 480, 540, 635];
const FUTURE_SDF_TIMESTAMPS = [50, 100, 125, 150, 200, 225, 250];

function getSdfBlend(ma) {
  const noFuture = { futureIndexA: 0, futureIndexB: 0, futureBlend: 0, futureWeight: 0 };
  if (ma < 0) {
    const futureMa = -ma;
    const nf = FUTURE_SDF_TIMESTAMPS.length;
    const pastBase = { indexA: 0, indexB: 0, blend: 0 };
    if (futureMa <= 0) return { ...pastBase, ...noFuture };
    if (futureMa >= FUTURE_SDF_TIMESTAMPS[nf - 1])
      return { ...pastBase, futureIndexA: nf-1, futureIndexB: nf-1, futureBlend: 0, futureWeight: 1 };
    if (futureMa < FUTURE_SDF_TIMESTAMPS[0]) {
      const t = futureMa / FUTURE_SDF_TIMESTAMPS[0];
      return { ...pastBase, futureIndexA: 0, futureIndexB: 0, futureBlend: 0, futureWeight: t*t*(3-2*t) };
    }
    for (let i = 0; i < nf - 1; i++) {
      if (futureMa >= FUTURE_SDF_TIMESTAMPS[i] && futureMa < FUTURE_SDF_TIMESTAMPS[i+1]) {
        const t = (futureMa - FUTURE_SDF_TIMESTAMPS[i]) / (FUTURE_SDF_TIMESTAMPS[i+1] - FUTURE_SDF_TIMESTAMPS[i]);
        return { ...pastBase, futureIndexA: i, futureIndexB: i+1, futureBlend: t*t*(3-2*t), futureWeight: 1 };
      }
    }
    return { ...pastBase, futureIndexA: nf-1, futureIndexB: nf-1, futureBlend: 0, futureWeight: 1 };
  }
  const n = SDF_TIMESTAMPS.length;
  if (ma <= SDF_TIMESTAMPS[0])     return { indexA: 0,   indexB: 0,   blend: 0, ...noFuture };
  if (ma >= SDF_TIMESTAMPS[n - 1]) return { indexA: n-1, indexB: n-1, blend: 0, ...noFuture };
  for (let i = 0; i < n - 1; i++) {
    if (ma >= SDF_TIMESTAMPS[i] && ma < SDF_TIMESTAMPS[i+1]) {
      const blend = (ma - SDF_TIMESTAMPS[i]) / (SDF_TIMESTAMPS[i+1] - SDF_TIMESTAMPS[i]);
      return { indexA: i, indexB: i+1, blend, ...noFuture };
    }
  }
  return { indexA: n-1, indexB: n-1, blend: 0, ...noFuture };
}

// Pre-compute representative Ma and SDF indices for each state.
// Past states use midpoint Ma; future states use negative of their midpoint.
function precomputeSdf(states, isFuture) {
  states.forEach(s => {
    if (!s.useLandSea) { s._sdf = null; return; }
    const mid = (s.span[0] + s.span[1]) / 2;
    const ma  = isFuture ? -mid : mid;
    s._sdf = getSdfBlend(ma);
  });
}
precomputeSdf(STATES,        false);
precomputeSdf(FUTURE_STATES, true);

// ─── Shaders (from clock.html) ────────────────────────────────────────────────
const vertexShader = `
  varying vec3 vNormal;
  varying vec3 vPosition;
  void main() {
    vNormal   = normalize(normalMatrix * normal);
    vPosition = position;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// clock.html uses a JS template literal with CLOUDS_ENABLED; inlined here with clouds on.
const fragmentShader = `
  uniform float time;
  uniform vec3 aC0, aC1, aC2, aC3;
  uniform vec3 bC0, bC1, bC2, bC3;
  uniform vec3 c4;
  uniform float aCloudDens, bCloudDens;
  uniform float aSurfIntens, bSurfIntens;
  uniform float aCloudShape, bCloudShape;
  uniform float aPolarIce, bPolarIce;
  uniform float aSeed, bSeed;
  uniform float stateBlend;
  uniform float atmosphereBlend;
  uniform float cloudRotation;
  uniform sampler2D sdfAtlas;
  uniform float sdfIndexA, sdfIndexB, sdfBlend;
  uniform sampler2D futureSdfAtlas;
  uniform float futureSdfIndexA, futureSdfIndexB, futureSdfBlend, futureSdfWeight;
  uniform float aUseLandSea, bUseLandSea;
  uniform float aCoastSoft, bCoastSoft;
  uniform float aNoiseThresh1, aNoiseThresh2;
  uniform float bNoiseThresh1, bNoiseThresh2;
  uniform float aCloudApproach, bCloudApproach;
  const float ATLAS_N = 11.0;
  const float FUTURE_ATLAS_N = 7.0;

  varying vec3 vNormal;
  varying vec3 vPosition;

  float hash31(vec3 p) {
    p = fract(p * vec3(443.8975,397.2973,491.1871));
    p += dot(p, p.yzx + 19.19);
    return fract((p.x + p.y) * p.z);
  }
  float noise3d(vec3 p) {
    vec3 i = floor(p); vec3 f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(
      mix(mix(hash31(i+vec3(0,0,0)),hash31(i+vec3(1,0,0)),f.x),
          mix(hash31(i+vec3(0,1,0)),hash31(i+vec3(1,1,0)),f.x),f.y),
      mix(mix(hash31(i+vec3(0,0,1)),hash31(i+vec3(1,0,1)),f.x),
          mix(hash31(i+vec3(0,1,1)),hash31(i+vec3(1,1,1)),f.x),f.y),
      f.z);
  }
  // 2-octave fbm — cloud warp only
  float fbm(vec3 p) {
    float v=0.0,a=0.5;
    for(int i=0;i<2;i++){v+=a*noise3d(p);p*=2.02;a*=0.5;}
    return v;
  }
  // 4-octave fbm — surface rendering
  float fbmSurf(vec3 p) {
    float v=0.0,a=0.5;
    for(int i=0;i<4;i++){v+=a*noise3d(p);p*=2.02;a*=0.5;}
    return v;
  }
  float fbm2(vec3 p) {
    return noise3d(p)*0.65 + noise3d(p*2.1+vec3(11.0))*0.35;
  }
  float ridgedNoise(vec3 p){ return 1.0-abs(noise3d(p)*2.0-1.0); }
  // 5-octave ridged fbm
  float ridgedFbm2(vec3 p) {
    float v=0.0,a=0.5,prev=1.0;
    for(int i=0;i<5;i++){float n=ridgedNoise(p);v+=a*n*prev;prev=n;p*=2.2;a*=0.45;}
    return v;
  }
  float hash21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}

  // Surface: screenprint only (clock.html doesn't branch on surfApproach)
  vec3 renderSurface(vec3 p, vec3 c0, vec3 c1, vec3 c2, vec3 c3,
                     float si, float seed, float sdf, float uls, float cs,
                     float t1, float t2) {
    vec3 sOff = vec3(seed*13.7, seed*7.3, seed*19.1);
    float s1=clamp(t1,0.04,0.94), s2=clamp(t2,0.04,0.97);
    float n1=fbmSurf(p*2.4+sOff), n2=fbmSurf(p*4.6+sOff*1.3+vec3(100.0));
    float shape1=smoothstep(s1-0.04,s1+0.04,n1);
    float shape2=smoothstep(s2-0.04,s2+0.04,n2);
    float overlap=shape1*shape2;
    vec3 ns=c3;
    ns=mix(ns,c2,shape1);
    ns=mix(ns,c1,shape2*0.85);
    ns*=mix(1.0,0.86,overlap);
    vec3 nc=mix(c2,ns,si);
    float seaMod=mix(1.0,0.93,shape1);
    vec3 seaC=c2*seaMod, landC=c1*mix(1.0,0.93,shape1);
    float landness=smoothstep(0.5-cs,0.5+cs,sdf);
    return mix(nc, mix(seaC,landC,landness), uls);
  }

  vec3 rotateY(vec3 v,float a){float c=cos(a),s=sin(a);return vec3(v.x*c+v.z*s,v.y,-v.x*s+v.z*c);}

  // Cloud: warped_wisps single branch (clock.html)
  float computeCloudMask(vec3 p, float cd, float cs, float seed, float ca) {
    if(cd<0.001) return 0.0;
    vec3 cp=rotateY(p,cloudRotation);
    vec3 sOff=vec3(seed*13.7,seed*7.3,seed*19.1)+vec3(time*0.004,time*0.003,time*0.0025);
    float yAniso=mix(1.8,1.0,cs);
    float latFade=1.0-pow(abs(cp.y),3.0)*0.25;
    float warpStrength=mix(0.65,1.6,cs);
    vec3 warp=vec3(fbm(cp*1.2+sOff),fbm(cp*1.2+sOff+vec3(13.1)),fbm(cp*1.2+sOff+vec3(27.7)))-0.5;
    vec3 sp=vec3(cp.x+sOff.x*0.2,cp.y*yAniso,cp.z+sOff.y*0.2)+warp*warpStrength;
    float cA=fbm2(sp*2.0);
    vec3 sp2=vec3(cp.x*0.7,cp.y*yAniso*0.55,cp.z*0.7)+warp*warpStrength*0.6;
    float cB=fbm2(sp2+sOff*0.1);
    float yStr=mix(1.6,1.0,cs);
    vec3 rp=vec3(sp.x,sp.y*yStr,sp.z);
    float ridgeDetail=ridgedFbm2(rp*3.0+sOff*0.6);
    float field=cA*0.48+cB*0.22+ridgeDetail*0.30;
    float erosion=ridgedFbm2(cp*5.0+sOff*0.4+vec3(42.0));
    field=field*(0.7+erosion*0.3);
    float thresh=mix(0.78,0.18,cd);
    float mask=smoothstep(thresh,thresh+0.06,field)*latFade;
    mask*=1.0+0.05*sin(time*0.18);
    return mask;
  }

  float sampleSdf(vec3 p,float idx){
    float lon=atan(p.z,-p.x),lat=asin(clamp(p.y,-1.0,1.0));
    float u=0.5+lon/6.2831853,vl=0.5-lat/3.1415926;
    return texture2D(sdfAtlas,vec2(u,(idx+vl)/ATLAS_N)).r;
  }
  float sampleFutureSdf(vec3 p,float idx){
    float lon=atan(p.z,-p.x),lat=asin(clamp(p.y,-1.0,1.0));
    float u=0.5+lon/6.2831853,vl=0.5-lat/3.1415926;
    return texture2D(futureSdfAtlas,vec2(u,(idx+vl)/FUTURE_ATLAS_N)).r;
  }

  void main() {
    vec3 p=normalize(vPosition);
    float sA=sampleSdf(p,sdfIndexA),sB=sampleSdf(p,sdfIndexB);
    float sdfP=mix(sA,sB,sdfBlend);
    float fA=sampleFutureSdf(p,futureSdfIndexA),fB=sampleFutureSdf(p,futureSdfIndexB);
    float sdfF=mix(fA,fB,futureSdfBlend);
    float sdfSample=mix(sdfP,sdfF,futureSdfWeight);

    vec3 colA=renderSurface(p,aC0,aC1,aC2,aC3,aSurfIntens,aSeed,sdfSample,aUseLandSea,aCoastSoft,aNoiseThresh1,aNoiseThresh2);
    vec3 col;
    if(stateBlend>0.001){
      vec3 colB=renderSurface(p,bC0,bC1,bC2,bC3,bSurfIntens,bSeed,sdfSample,bUseLandSea,bCoastSoft,bNoiseThresh1,bNoiseThresh2);
      col=mix(colA,colB,stateBlend);
    }else{
      col=colA;
    }

    vec3 c0M=mix(aC0,bC0,atmosphereBlend);
    float cmA=computeCloudMask(p,aCloudDens,aCloudShape,aSeed,aCloudApproach);
    float cm;
    if(atmosphereBlend>0.001){
      float cmB=computeCloudMask(p,bCloudDens,bCloudShape,bSeed,bCloudApproach);
      cm=mix(cmA,cmB,atmosphereBlend);
    }else{
      cm=cmA;
    }
    col=mix(col,c0M,cm*0.92);

    float piM=mix(aPolarIce,bPolarIce,atmosphereBlend);
    float ice=smoothstep(0.70,0.90,abs(p.y));
    col=mix(col,c0M,ice*piM*0.85);

    float cd=1.0-max(0.0,dot(vNormal,vec3(0,0,1)));
    vec3 ld=normalize(vec3(-0.45,0.55,0.70));
    float lit=clamp(dot(vNormal,ld)*0.5+0.5,0.0,1.0);
    col*=mix(0.60,1.0,lit);
    col=mix(col,c4,pow(cd,1.6)*0.85);

    float g=(hash21(floor(gl_FragCoord.xy/1.0))*2.0-1.0);
    col=clamp(col+g*0.04,0.0,1.0);

    float alpha=1.0-smoothstep(0.97,1.0,cd);
    gl_FragColor=vec4(col,alpha);
  }
`;

// ─── Globe size ───────────────────────────────────────────────────────────────
const GLOBE_PX = 160;

// ─── Build DOM cells ──────────────────────────────────────────────────────────
const displayCanvases = [];

function buildRow(states, rowEl) {
  states.forEach(s => {
    const cell = document.createElement('div');
    cell.className = 'globe-cell';

    const dc = document.createElement('canvas');
    dc.className = 'gc';
    dc.width = GLOBE_PX;
    dc.height = GLOBE_PX;

    cell.appendChild(dc);
    rowEl.appendChild(cell);

    displayCanvases.push({ canvas: dc, ctx2d: dc.getContext('2d'), state: s });
  });
}

buildRow(STATES,                      document.getElementById('past-row'));
buildRow([...FUTURE_STATES].reverse(), document.getElementById('future-row'));

// ─── Three.js setup ───────────────────────────────────────────────────────────
const renderCanvas = document.createElement('canvas');
renderCanvas.width = GLOBE_PX;
renderCanvas.height = GLOBE_PX;

const renderer = new THREE.WebGLRenderer({ canvas: renderCanvas, antialias: false, alpha: true, preserveDrawingBuffer: true });
renderer.setSize(GLOBE_PX, GLOBE_PX);
renderer.setPixelRatio(1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 3.12;

const geo = new THREE.SphereGeometry(1, 48, 48);

const dummyTex = new THREE.DataTexture(new Uint8Array([128,128,128,255]), 1, 1, THREE.RGBAFormat);
dummyTex.needsUpdate = true;

function v3(r) { return new THREE.Vector3(r[0], r[1], r[2]); }
const s0 = STATES[0];
const mat = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  transparent: true,
  uniforms: {
    time:            { value: 0 },
    stateBlend:      { value: 0 },
    atmosphereBlend: { value: 0 },
    cloudRotation:   { value: 0 },
    sdfAtlas:        { value: dummyTex },
    futureSdfAtlas:  { value: dummyTex },
    sdfIndexA: { value: 0 }, sdfIndexB: { value: 0 }, sdfBlend: { value: 0 },
    futureSdfIndexA: { value: 0 }, futureSdfIndexB: { value: 0 },
    futureSdfBlend:  { value: 0 }, futureSdfWeight: { value: 0 },
    aC0: { value: v3(s0.rgb[0]) }, aC1: { value: v3(s0.rgb[1]) },
    aC2: { value: v3(s0.rgb[2]) }, aC3: { value: v3(s0.rgb[3]) },
    bC0: { value: v3(s0.rgb[0]) }, bC1: { value: v3(s0.rgb[1]) },
    bC2: { value: v3(s0.rgb[2]) }, bC3: { value: v3(s0.rgb[3]) },
    c4:  { value: v3(s0.rgb[4]) },
    aCloudDens:  { value: 0 }, bCloudDens:  { value: 0 },
    aSurfIntens: { value: 1 }, bSurfIntens: { value: 1 },
    aCloudShape: { value: 0 }, bCloudShape: { value: 0 },
    aPolarIce:   { value: 0 }, bPolarIce:   { value: 0 },
    aSeed: { value: 1 }, bSeed: { value: 1 },
    aUseLandSea: { value: 0 }, bUseLandSea: { value: 0 },
    aCoastSoft:  { value: 0.01 }, bCoastSoft: { value: 0.01 },
    aNoiseThresh1: { value: 0.46 }, aNoiseThresh2: { value: 0.56 },
    bNoiseThresh1: { value: 0.46 }, bNoiseThresh2: { value: 0.56 },
    aCloudApproach: { value: 0 }, bCloudApproach: { value: 0 },
  }
});

const sphere = new THREE.Mesh(geo, mat);
scene.add(sphere);

function setUniforms(S) {
  const u = mat.uniforms;
  const cid = { warped: 0.0, ridged_wisps: 1.0, warped_layers: 2.0, warped_wisps: 3.0 }[S.cloudApproach ?? 'warped'] ?? 0.0;
  ['a','b'].forEach(p => {
    u[p+'C0'].value.set(S.rgb[0][0],S.rgb[0][1],S.rgb[0][2]);
    u[p+'C1'].value.set(S.rgb[1][0],S.rgb[1][1],S.rgb[1][2]);
    u[p+'C2'].value.set(S.rgb[2][0],S.rgb[2][1],S.rgb[2][2]);
    u[p+'C3'].value.set(S.rgb[3][0],S.rgb[3][1],S.rgb[3][2]);
    u[p+'CloudDens'].value    = S.cloudDensity;
    u[p+'SurfIntens'].value   = S.surfaceIntensity;
    u[p+'CloudShape'].value   = S.cloudShape;
    u[p+'PolarIce'].value     = S.polarIce;
    u[p+'Seed'].value         = S.seed;
    u[p+'UseLandSea'].value   = S.useLandSea ?? 0.0;
    u[p+'CoastSoft'].value    = S.coastSoftness ?? 0.01;
    u[p+'NoiseThresh1'].value = S.noiseThresh1 ?? 0.46;
    u[p+'NoiseThresh2'].value = S.noiseThresh2 ?? 0.56;
    u[p+'CloudApproach'].value = cid;
  });
  u.c4.value.set(S.rgb[4][0],S.rgb[4][1],S.rgb[4][2]);
  u.stateBlend.value = 0;
  u.atmosphereBlend.value = 0;

  // SDF slice indices for this state
  const sdf = S._sdf;
  if (sdf) {
    u.sdfIndexA.value       = sdf.indexA;
    u.sdfIndexB.value       = sdf.indexB;
    u.sdfBlend.value        = sdf.blend;
    u.futureSdfIndexA.value = sdf.futureIndexA;
    u.futureSdfIndexB.value = sdf.futureIndexB;
    u.futureSdfBlend.value  = sdf.futureBlend;
    u.futureSdfWeight.value = sdf.futureWeight;
  } else {
    u.sdfIndexA.value = 0; u.sdfIndexB.value = 0; u.sdfBlend.value = 0;
    u.futureSdfIndexA.value = 0; u.futureSdfIndexB.value = 0;
    u.futureSdfBlend.value = 0; u.futureSdfWeight.value = 0;
  }
}

// ─── SDF atlas loading ────────────────────────────────────────────────────────
function makeTexture(b64) {
  return new Promise(resolve => {
    const tex = new THREE.Texture();
    const img = new Image();
    img.onload = () => {
      tex.image          = img;
      tex.minFilter      = THREE.LinearFilter;
      tex.magFilter      = THREE.LinearFilter;
      tex.wrapS          = THREE.RepeatWrapping;
      tex.wrapT          = THREE.ClampToEdgeWrapping;
      tex.generateMipmaps = false;
      tex.flipY          = false;
      tex.needsUpdate    = true;
      resolve(tex);
    };
    img.src = 'data:image/png;base64,' + b64;
  });
}

async function loadAtlases() {
  const html = await fetch('/clock.html').then(r => r.text());
  const pastMatch   = html.match(/const SDF_ATLAS_BASE64 = '([A-Za-z0-9+/=]+)'/);
  const futureMatch = html.match(/const FUTURE_SDF_ATLAS_BASE64 = '([A-Za-z0-9+/=]+)'/);
  if (pastMatch)   mat.uniforms.sdfAtlas.value       = await makeTexture(pastMatch[1]);
  if (futureMatch) mat.uniforms.futureSdfAtlas.value = await makeTexture(futureMatch[1]);
}

// ─── Render loop ──────────────────────────────────────────────────────────────
let startTime = null;
let cloudRotation = 0;
let sphereRotation = 0;

function tick(now) {
  if (!startTime) startTime = now;
  const elapsed = (now - startTime) / 1000;
  const delta   = elapsed - (tick._last ?? elapsed);
  tick._last    = elapsed;

  cloudRotation  -= delta * (Math.PI * 2 / 900) * 1.2;
  sphereRotation += delta * (Math.PI * 2 / 900);
  sphere.rotation.y = sphereRotation;

  mat.uniforms.time.value          = elapsed;
  mat.uniforms.cloudRotation.value = cloudRotation;

  for (const { ctx2d, state } of displayCanvases) {
    setUniforms(state);
    renderer.render(scene, camera);
    ctx2d.clearRect(0, 0, GLOBE_PX, GLOBE_PX);
    ctx2d.drawImage(renderCanvas, 0, 0);
  }

  requestAnimationFrame(tick);
}

// Start rendering immediately (continents snap in when atlases load)
requestAnimationFrame(tick);
loadAtlases();
</script>
</body>
</html>
