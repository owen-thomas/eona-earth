<!DOCTYPE html>
<html>
<head><title>Noise Atlas Baker</title></head>
<body>
<button id="bake">Bake noise atlas</button>
<p id="status"></p>
<canvas id="gl" width="512" height="256" style="display:none"></canvas>
<canvas id="out" width="512" height="3072" style="display:none"></canvas>
<script>

// ── STATES array — indices 0–11 only (the 12 procedural entries) ──────────
//
// sharpenWidth: smoothstep window around the noise midpoint (0.5).
//   1.0 = full fbm range, no sharpening — organic gradients.
//   0.3 = narrow window — crisp graphic blobs (Icinori-style).
//   0.0 = hard binary threshold at 0.5 (step function, no anti-alias).
// Snowball states use wide values to keep the icy texture smooth.
//
// noiseScale: frequency multiplier passed into fbm (was hardcoded 2.5).
//   Lower = fewer, bolder landmasses. Higher = more fragmented detail.
//   fbm is scale-invariant so land/water ratios are preserved at any scale.
//   Snowball states use the original 2.5 — fine detail reads better as ice.
const STATES = [
  // === 01 · Molten Hadean (early) — 4540–4420 Ma ===
  { name: 'Molten Hadean (early)',
    seed: 1.3, surfaceIntensity: 0.95, sharpenWidth: 0.50, noiseScale: 1.6 },

  // === 01 · Molten Hadean (late) — 4420–4300 Ma ===
  { name: 'Molten Hadean (late)',
    seed: 1.3, surfaceIntensity: 0.95, sharpenWidth: 0.50, noiseScale: 1.6 },

  // === 02 · Steam World — 4300–4000 Ma ===
  { name: 'Steam world',
    seed: 2.7, surfaceIntensity: 0.65, sharpenWidth: 0.40, noiseScale: 1.6 },

  // === 03 · Hazy Archean (early) — 4000–3200 Ma ===
  { name: 'Hazy Archean (early)',
    seed: 3.1, surfaceIntensity: 0.70, sharpenWidth: 0.35, noiseScale: 1.6 },

  // === 04 · Hazy Archean (late) — 3200–2500 Ma ===
  { name: 'Hazy Archean (late)',
    seed: 3.8, surfaceIntensity: 0.68, sharpenWidth: 0.35, noiseScale: 1.6 },

  // === 05 · Great Oxidation (early) — 2500–2400 Ma ===
  { name: 'Great Oxidation (early)',
    seed: 4.5, surfaceIntensity: 0.75, sharpenWidth: 0.30, noiseScale: 1.6 },

  // === 06 · Great Oxidation (late) — 2400–2300 Ma ===
  { name: 'Great Oxidation (late)',
    seed: 4.7, surfaceIntensity: 0.75, sharpenWidth: 0.30, noiseScale: 1.6 },

  // === 07 · Huronian Snowball — 2300–2100 Ma ===
  // Wide window + original scale — ice texture should be soft and fine, not graphic.
  { name: 'Huronian snowball',
    seed: 5.1, surfaceIntensity: 0.32, sharpenWidth: 0.80, noiseScale: 2.5 },

  // === 08 · Boring Billion (early) — 2100–1500 Ma ===
  { name: 'Boring Billion (early)',
    seed: 6.0, surfaceIntensity: 0.62, sharpenWidth: 0.35, noiseScale: 1.6 },

  // === 09 · Boring Billion (mid) — 1500–1000 Ma ===
  { name: 'Boring Billion (mid)',
    seed: 6.4, surfaceIntensity: 0.60, sharpenWidth: 0.35, noiseScale: 1.6 },

  // === 10 · Boring Billion (late) — 1000–720 Ma ===
  { name: 'Boring Billion (late)',
    seed: 6.8, surfaceIntensity: 0.58, sharpenWidth: 0.35, noiseScale: 1.6 },

  // === 11 · Cryogenian Snowball — 720–635 Ma (noise component) ===
  // Same rationale as Huronian.
  { name: 'Cryogenian snowball',
    seed: 7.3, surfaceIntensity: 0.28, sharpenWidth: 0.80, noiseScale: 2.5 },
];

// ── GLSL source ────────────────────────────────────────────────────────────
// Renders a single flat equirectangular pass, greyscale noise only.
// noiseThresh1 / noiseThresh2 are NOT applied — raw noise value only.
// Orientation matches SDF atlas: lon uses atan(p.z, -p.x), v=0 = south pole.

const VERT = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main() {
    v_uv = a_pos * 0.5 + 0.5;
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }
`;

const FRAG = `
  precision highp float;
  varying vec2 v_uv;
  uniform float u_seed;
  uniform float u_surfaceIntensity;
  // sharpenWidth: smoothstep window half-width around 0.5.
  // 1.0 = smoothstep(0.0, 1.0, n) — organic. 0.0 = step(0.5, n) — hard binary.
  uniform float u_sharpenWidth;
  uniform float u_noiseScale;

  float hash31(vec3 p) {
    p = fract(p * vec3(443.8975, 397.2973, 491.1871));
    p += dot(p, p.yzx + 19.19);
    return fract((p.x + p.y) * p.z);
  }
  float noise3d(vec3 p) {
    vec3 i = floor(p);
    vec3 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(mix(hash31(i + vec3(0.0,0.0,0.0)), hash31(i + vec3(1.0,0.0,0.0)), f.x),
          mix(hash31(i + vec3(0.0,1.0,0.0)), hash31(i + vec3(1.0,1.0,0.0)), f.x), f.y),
      mix(mix(hash31(i + vec3(0.0,0.0,1.0)), hash31(i + vec3(1.0,0.0,1.0)), f.x),
          mix(hash31(i + vec3(0.0,1.0,1.0)), hash31(i + vec3(1.0,1.0,1.0)), f.x), f.y),
      f.z);
  }
  float fbm(vec3 p) {
    float v = 0.0;
    float a = 0.5;
    for (int i = 0; i < 4; i++) {
      v += a * noise3d(p);
      p *= 2.02;
      a *= 0.5;
    }
    return v;
  }

  void main() {
    // Equirectangular UV → sphere surface normal.
    // lon: atan(p.z, -p.x) matches SDF atlas orientation (east = increasing lon).
    // lat: v_uv.y=0 → south pole, v_uv.y=1 → north pole (flipY=false convention).
    float lon = (v_uv.x * 2.0 - 1.0) * 3.14159265;
    float lat = (v_uv.y * 2.0 - 1.0) * 1.5707963;
    // Reconstruct unit sphere point matching the SDF atlas orientation:
    // p.x = cos(lat)*cos(lon), p.y = sin(lat), p.z = cos(lat)*sin(lon)
    // atan(p.z, -p.x) reverses to give lon correctly — so we negate x here.
    vec3 p = vec3(-cos(lat) * cos(lon), sin(lat), cos(lat) * sin(lon));

    // Same noise evaluation as the shader surface path
    vec3 noisePos = p + vec3(u_seed * 7.3, u_seed * 3.1, u_seed * 5.7);
    float n = fbm(noisePos * u_noiseScale);
    n = clamp(n / 0.9375, 0.0, 1.0); // normalise fbm range to [0,1]
    n = mix(0.5, n, u_surfaceIntensity); // apply surfaceIntensity

    // Sharpening curve: narrow the smoothstep window around 0.5 to push noise
    // toward graphic blobs (Icinori-style). Width 1.0 = full range / organic;
    // width → 0 = hard binary threshold. Fallback to step() at exact zero.
    float hw = u_sharpenWidth * 0.5;
    n = (hw > 0.0) ? smoothstep(0.5 - hw, 0.5 + hw, n) : step(0.5, n);

    gl_FragColor = vec4(n, n, n, 1.0);
  }
`;

document.getElementById('bake').addEventListener('click', async () => {
  const status   = document.getElementById('status');
  const glCanvas = document.getElementById('gl');
  const gl       = glCanvas.getContext('webgl', { preserveDrawingBuffer: true });

  if (!gl) {
    status.textContent = 'ERROR: WebGL not available.';
    return;
  }

  const vert = compileShader(gl, gl.VERTEX_SHADER,   VERT);
  const frag = compileShader(gl, gl.FRAGMENT_SHADER, FRAG);
  const prog = gl.createProgram();
  gl.attachShader(prog, vert);
  gl.attachShader(prog, frag);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER,
    new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uSeed      = gl.getUniformLocation(prog, 'u_seed');
  const uIntensity = gl.getUniformLocation(prog, 'u_surfaceIntensity');
  const uSharpen     = gl.getUniformLocation(prog, 'u_sharpenWidth');
  const uNoiseScale  = gl.getUniformLocation(prog, 'u_noiseScale');

  const outCanvas = document.getElementById('out');
  const outCtx    = outCanvas.getContext('2d');

  for (let i = 0; i < 12; i++) {
    const s = STATES[i];
    gl.uniform1f(uSeed,      s.seed);
    gl.uniform1f(uIntensity, s.surfaceIntensity);
    gl.uniform1f(uSharpen,     s.sharpenWidth);
    gl.uniform1f(uNoiseScale,  s.noiseScale);
    gl.viewport(0, 0, 512, 256);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    const pixels = new Uint8Array(512 * 256 * 4);
    gl.readPixels(0, 0, 512, 256, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

    // WebGL readPixels returns rows bottom-to-top; flip vertically so row 0 = top.
    const flipped = new Uint8ClampedArray(512 * 256 * 4);
    for (let row = 0; row < 256; row++) {
      const srcRow = 255 - row;
      flipped.set(
        pixels.subarray(srcRow * 512 * 4, (srcRow + 1) * 512 * 4),
        row * 512 * 4
      );
    }

    const slice = new ImageData(flipped, 512, 256);
    outCtx.putImageData(slice, 0, i * 256);

    status.textContent = `Baked ${i + 1} / 12 — ${s.name}`;
    await new Promise(r => setTimeout(r, 0)); // yield to repaint
  }

  outCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'noise-atlas.png';
    a.click();
    status.textContent = 'Done. Convert to base64 and paste into deeptime.html.';
  });
});

function compileShader(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}

</script>
</body>
</html>
